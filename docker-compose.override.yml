# Linux override for hubs-compose
# Replaces Mutagen volume sync (macOS) with standard bind mounts
# Fixes dialog cert paths for Linux (container paths, not host paths)

services:
  dialog:
    # Cert paths defined in config.exs (see services/reticulum/config/dev.exs — config :ret, :dialog)
    # These env vars pass the canonical paths to the separate Dialog process at runtime.
    environment:
      AUTH_KEY: /etc/perms.pub.pem
      HTTPS_CERT_FULLCHAIN: /etc/ssl/fullchain.pem
      HTTPS_CERT_PRIVKEY: /etc/ssl/privkey.pem
    volumes:
      - ./services/dialog:/code

  hubs-admin:
    volumes:
      - ./services/hubs:/code

  hubs-client:
    volumes:
      - ./services/hubs:/code

  hubs-storybook:
    volumes:
      - ./services/hubs:/code

  reticulum:
    # BEGIN reticulum-http-port
    ports:
      - "4002:4001"
    # END reticulum-http-port
    environment:
      PERMS_KEY_PATH: /certs/perms.priv.pem
    volumes:
      - ./services/reticulum:/code
      - ./services/dialog/certs:/certs:ro
      - ./services/reticulum/storage/dev:/code/storage/dev

  spoke:
    volumes:
      - ./services/spoke:/code

volumes:
  pgdata:
