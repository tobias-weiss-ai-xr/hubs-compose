name: Deploy to Production
on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/containers/hubs-compose
  REPO_URL: git@codeberg.org:graphwiz-ai/hubs-compose.git

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Ensure repo is cloned and on correct branch
            if [ ! -d .git ]; then
              git clone ${{ env.REPO_URL }} .
            fi
            git fetch origin
            git checkout main
            git pull origin main

            # Pull latest sub-repo changes
            for sub in services/reticulum services/spoke services/hubs services/dialog; do
              if [ -d "$sub/.git" ]; then
                git -C "$sub" pull origin master 2>/dev/null || true
              fi
            done

            # Build and deploy all services
            docker compose build --parallel
            docker compose up -d --force-recreate

            # Wait and verify
            echo "Waiting for services to become healthy..."
            sleep 15
            docker compose ps --format "table {{.Name}}\t{{.Status}}"

            # Check for unhealthy services
            unhealthy=$(docker compose ps --format "{{.Name}}\t{{.Status}}" | grep -i unhealthy || true)
            if [ -n "$unhealthy" ]; then
              echo "⚠️  Unhealthy services detected:"
              echo "$unhealthy"
              exit 1
            fi
            echo "✅ All services healthy"

      - name: Notify on success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"text":"✅ hubs-compose deployed successfully: ${{ github.sha }}"}' \
            "${{ secrets.MATRIX_WEBHOOK_URL }}"
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"text":"❌ hubs-compose deploy FAILED: ${{ github.sha }}"}' \
            "${{ secrets.MATRIX_WEBHOOK_URL }}"
        continue-on-error: true
