name: Build and Push Docker Images
on:
  push:
    branches: [main, master]
    paths:
      - 'dockerfiles/*.Dockerfile'
      - 'services/**/*'
      - 'docker-compose.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: reticulum
            dockerfile: services/reticulum/TurkeyDockerfile
            target: dev
          - service: spoke
            dockerfile: dockerfiles/spoke.Dockerfile
          - service: hubs
            dockerfile: dockerfiles/hubs.Dockerfile
          - service: dialog
            dockerfile: dockerfiles/dialog.Dockerfile
          - service: postgrest
            dockerfile: dockerfiles/postgrest.Dockerfile
          - service: coturn
            dockerfile: dockerfiles/coturn.Dockerfile
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}" >> $GITHUB_ENV

      - name: Set build context
        run: |
          if [[ "${{ matrix.dockerfile }}" == services/* ]]; then
            echo "BUILD_CONTEXT=$(dirname ${{ matrix.dockerfile }})" >> $GITHUB_ENV
          else
            echo "BUILD_CONTEXT=." >> $GITHUB_ENV
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
