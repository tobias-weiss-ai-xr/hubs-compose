services:
  db:
    environment:
      POSTGRES_PASSWORD: ${DB_CREDENTIALS:-postgres}
    healthcheck:
      test: ["CMD", "pg_isready"]
    image: "postgres:14-alpine"
    user: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  coturn:
    environment:
      REALM: ret
      PSQL: host=db dbname=ret_dev user=postgres password=postgres options='-c search_path=coturn' connect_timeout=30
      TLS_PORT: 5349
      MIN_PORT: 50000
      MAX_PORT: 50050
    build:
      context: .
      dockerfile: dockerfiles/coturn.Dockerfile
    volumes:
      - coturn:/var/lib/coturn
    ports:
      - "5349:5349"
      - "50000-50050:50000-50050"
      - "50000-50050:50000-50050/udp"
    depends_on:
      - db
  dialog:
    build:
      context: .
      dockerfile: dockerfiles/dialog.Dockerfile
    environment:
      INTERACTIVE: "false"
      MEDIASOUP_MIN_PORT: 40000
      MEDIASOUP_MAX_PORT: 40050
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-hubs.local}
    ports:
      - "4443:4443"
      - "40000-40050:40000-40050"
      - "40000-40050:40000-40050/udp"
    volumes:
      - dialog:/code
    working_dir: /code
  hubs-admin:
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run local -- --allowed-hosts all
    environment:
      INTERNAL_HOSTNAME: hubs-admin
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8989/admin.html"]
    platform: linux/amd64
    ports:
      - "8989:8989"
    volumes:
      - hubs:/code
    working_dir: /code/admin
  hubs-client:
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run local -- --allowed-hosts all
    environment:
      HUBS_HOST: ${HUBS_HOST:-hubs.tobias-weiss.org}
      INTERNAL_HOSTNAME: hubs-client
    healthcheck:
      start_period: 3m30s
      test: ["CMD", "curl", "-fk", "https://localhost:8080"]
    platform: linux/amd64
    ports:
      - "8081:8080"
    volumes:
      - hubs:/code
    working_dir: /code
  hubs-storybook:
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run storybook
    healthcheck:
      test: ["CMD", "curl", "-fk", "http://hubs.local:6006"]
    platform: linux/amd64
    ports:
      - "6006:6006"
    volumes:
      - hubs:/code
    working_dir: /code
  postgrest:
    build:
      context: .
      dockerfile: dockerfiles/postgrest.Dockerfile
  reticulum:
    build:
      context: ./services/reticulum
      dockerfile: TurkeyDockerfile
      target: dev
    depends_on:
      - db
    environment:
      HUBS_HOST: ${HUBS_HOST:-hubs.tobias-weiss.org}
      DB_CREDENTIALS: ${DB_CREDENTIALS:-postgres}
      DB_HOST: db
      DIALOG_HOSTNAME: ${DIALOG_HOSTNAME:-hubs.local}
      DIALOG_PORT: ${DIALOG_PORT:-4443}
      HUBS_ADMIN_INTERNAL_HOSTNAME: ${HUBS_ADMIN_INTERNAL_HOSTNAME:-hubs-admin}
      HUBS_CLIENT_INTERNAL_HOSTNAME: ${HUBS_CLIENT_INTERNAL_HOSTNAME:-hubs-client}
      PERMS_KEY_PATH: ${PERMS_KEY_PATH:-/etc/perms.pem}
      POSTGREST_INTERNAL_HOSTNAME: ${POSTGREST_INTERNAL_HOSTNAME:-postgrest}
      SPOKE_INTERNAL_HOSTNAME: ${SPOKE_INTERNAL_HOSTNAME:-spoke}
      SMTP_SERVER: ${SMTP_SERVER:-mail.tobias-weiss.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-hubs@tobias-weiss.org}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-HubsApp2026}
      EMAIL_FROM: ${EMAIL_FROM:-hubs@tobias-weiss.org}
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "https://127.0.0.1:4000/stream-offline.png"]
      start_period: 60s
      interval: 30s
    volumes:
      - reticulum:/code
      - retstorage:/code/storage/dev
  spoke:
    build:
      context: .
      dockerfile: dockerfiles/spoke.Dockerfile
    environment:
      CORS_PROXY_SERVER: "hubs-proxy.local:4000"
      INTERNAL_HOSTNAME: spoke
    platform: linux/amd64
    ports:
      - "9091:9090"
    volumes:
      - spoke:/code

  pse-vr:
    image: hello-webxr:latest
    container_name: pse-vr
    restart: unless-stopped
    ports:
      - "3000:80"

networks:
  default:
    name: mozilla-hubs
volumes:
  coturn:
  dialog:
  hubs:
  pgdata:
  reticulum:
  retstorage:
  spoke:
x-mutagen:
  sync:
    defaults:
      ignore:
        paths:
          - ".DS_Store"
          - ".gitignore"
          - "/certs/"
          - "/node_modules/"
          - "package-lock.sha512"
        vcs: true
      mode: "two-way-resolved"
    dialog:
      alpha: ./services/dialog
      beta: "volume://dialog"
    hubs:
      alpha: ./services/hubs
      beta: "volume://hubs"
      ignore:
        paths:
          - "/admin/certs/"
          - "/admin/node_modules/"
    reticulum:
      alpha: ./services/reticulum
      beta: "volume://reticulum"
      ignore:
        paths:
          - "/_build/"
          - "/bin/"
          - "/storage/"
    spoke:
      alpha: ./services/spoke
      beta: "volume://spoke"
