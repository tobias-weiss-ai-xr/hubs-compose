services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_CREDENTIALS:-postgres}
    healthcheck:
      test: ["CMD", "pg_isready"]
    image: "postgres:14-alpine"
    user: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  coturn:
    restart: unless-stopped
    environment:
      REALM: ret
      PSQL: host=db dbname=ret_dev user=postgres password=${DB_CREDENTIALS:-postgres} options='-c search_path=coturn' connect_timeout=30
      TLS_PORT: 5349
      MIN_PORT: 50000
      MAX_PORT: 50050
    build:
      context: .
      dockerfile: dockerfiles/coturn.Dockerfile
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5349"]
      start_period: 10s
      interval: 30s
    volumes:
      - coturn:/var/lib/coturn
    ports:
      - "5349:5349"
      - "50000-50050:50000-50050"
      - "50000-50050:50000-50050/udp"
    depends_on:
      - db
  dialog:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/dialog.Dockerfile
    environment:
      INTERACTIVE: "false"
      MEDIASOUP_MIN_PORT: 40000
      MEDIASOUP_MAX_PORT: 40050
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-hubs.local}
    ports:
      - "4443:4443"
      - "40000-40050:40000-40050"
      - "40000-40050:40000-40050/udp"
    volumes:
      - dialog:/code
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4443"]
      start_period: 15s
      interval: 30s
    working_dir: /code
  hubs-admin:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run local -- --allowed-hosts all
    environment:
      INTERNAL_HOSTNAME: hubs-admin
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8989/admin.html"]
    platform: linux/amd64
    ports:
      - "8989:8989"
    volumes:
      - hubs:/code
    working_dir: /code/admin
  hubs-client:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run local -- --allowed-hosts all
    environment:
      HUBS_HOST: ${HUBS_HOST:-hubs.tobias-weiss.org}
      INTERNAL_HOSTNAME: hubs-client
    healthcheck:
      start_period: 3m30s
      test: ["CMD", "curl", "-fk", "https://localhost:8080"]
    platform: linux/amd64
    ports:
      - "8083:8080"
    volumes:
      - hubs:/code
    working_dir: /code
  hubs-storybook:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/hubs.Dockerfile
    command: npm run storybook
    healthcheck:
      test: ["CMD", "curl", "-fk", "http://localhost:6006"]
    platform: linux/amd64
    ports:
      - "6006:6006"
    volumes:
      - hubs:/code
    working_dir: /code
  postgrest:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/postgrest.Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      start_period: 10s
      interval: 30s
  reticulum:
    build:
      context: ./services/reticulum
      dockerfile: TurkeyDockerfile
      target: dev
    depends_on:
      - db
    environment:
      HUBS_HOST: ${HUBS_HOST:-hubs.tobias-weiss.org}
      DB_CREDENTIALS: ${DB_CREDENTIALS:-postgres}
      DB_HOST: db
      DIALOG_HOSTNAME: ${DIALOG_HOSTNAME:-hubs.local}
      DIALOG_PORT: ${DIALOG_PORT:-4443}
      HUBS_ADMIN_INTERNAL_HOSTNAME: ${HUBS_ADMIN_INTERNAL_HOSTNAME:-hubs-admin}
      HUBS_CLIENT_INTERNAL_HOSTNAME: ${HUBS_CLIENT_INTERNAL_HOSTNAME:-hubs-client}
      PERMS_KEY_PATH: ${PERMS_KEY_PATH:-/etc/perms.pem}
      POSTGREST_INTERNAL_HOSTNAME: ${POSTGREST_INTERNAL_HOSTNAME:-postgrest}
      SPOKE_INTERNAL_HOSTNAME: ${SPOKE_INTERNAL_HOSTNAME:-spoke}
      SMTP_SERVER: ${SMTP_SERVER:-mail.tobias-weiss.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-hubs@tobias-weiss.org}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-changeme}
      EMAIL_FROM: ${EMAIL_FROM:-hubs@tobias-weiss.org}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-txlMOtlaY5x3crvOCko4uV5PM29ul3zGo1oBGNO3cDXx+7GHLKqt0gR9qzgThxb5}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY:-47iqPEdWcfE7xRnyaxKDLt9OGEtkQG3SycHBEMOuT2qARmoESnhc76IgCUjaQIwX}
      UPLOAD_ENCRYPTION_KEY: ${UPLOAD_ENCRYPTION_KEY:-a8dedeb57adafa7821027d546f016efef5a501bd}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      RETICULUM_ADMIN_KEY: ${RETICULUM_ADMIN_KEY:-admin-only}
      POSTGREST_PASSWORD: ${POSTGREST_PASSWORD:-password}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "4003:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "https://127.0.0.1:4000/stream-offline.png"]
      start_period: 60s
      interval: 30s
    restart: unless-stopped
    volumes:
      - reticulum:/code
      - retstorage:/code/storage/dev
  spoke:
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfiles/spoke.Dockerfile
    environment:
      CORS_PROXY_SERVER: "${CORS_PROXY_SERVER:-${HUBS_HOST:-hubs.tobias-weiss.org}:4000}"
      INTERNAL_HOSTNAME: spoke
    platform: linux/amd64
    ports:
      - "9091:9090"
    volumes:
      - spoke:/code

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9092:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      default:
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3333:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    networks:
      default:
    restart: unless-stopped

  pse-vr:
    image: hello-webxr:latest
    container_name: pse-vr
    restart: unless-stopped
    ports:
      - "3000:80"

networks:
  default:
    name: hubs-compose
volumes:
  coturn:
  dialog:
  grafana_data:
  prometheus_data:
  hubs:
  pgdata:
  reticulum:
  retstorage:
  spoke:
x-mutagen:
  sync:
    defaults:
      ignore:
        paths:
          - ".DS_Store"
          - ".gitignore"
          - "/certs/"
          - "/node_modules/"
          - "package-lock.sha512"
        vcs: true
      mode: "two-way-resolved"
    dialog:
      alpha: ./services/dialog
      beta: "volume://dialog"
    hubs:
      alpha: ./services/hubs
      beta: "volume://hubs"
      ignore:
        paths:
          - "/admin/certs/"
          - "/admin/node_modules/"
    reticulum:
      alpha: ./services/reticulum
      beta: "volume://reticulum"
      ignore:
        paths:
          - "/_build/"
          - "/bin/"
          - "/storage/"
    spoke:
      alpha: ./services/spoke
      beta: "volume://spoke"
