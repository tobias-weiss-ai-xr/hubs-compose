name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose syntax
        run: docker compose config -q
      - name: Validate docker-compose override syntax
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config -q

  reticulum-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Reticulum
        run: git clone --depth 1 https://github.com/mozilla/reticulum.git services/reticulum
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.14.3"
          otp-version: "23.3.4.18"
      - name: Cache Elixir deps
        uses: actions/cache@v4
        with:
          path: |
            services/reticulum/deps
            services/reticulum/_build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-${{ hashFiles('services/reticulum/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-
            ${{ runner.os }}-mix-
      - name: Get dependencies
        working-directory: services/reticulum
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Compile (test env)
        working-directory: services/reticulum
        env:
          MIX_ENV: test
        run: mix compile
      - name: Run tests
        working-directory: services/reticulum
        env:
          DB_HOST: localhost
          DB_CREDENTIALS: postgres
          MIX_ENV: test
        run: mix test

  dialog-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Dialog
        run: git clone --depth 1 https://github.com/mozilla/dialog.git services/dialog
      - uses: actions/setup-node@v4
        with:
          node-version: "16"
      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-16-dialog-${{ hashFiles('services/dialog/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-16-dialog-
      - name: Install dependencies
        working-directory: services/dialog
        run: npm ci
      - name: Lint
        working-directory: services/dialog
        run: npm run lint

  spoke-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Spoke
        run: git clone --depth 1 https://github.com/mozilla/Spoke.git services/spoke
      - uses: actions/setup-node@v4
        with:
          node-version: "16"
      - name: Cache yarn deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            services/spoke/node_modules
          key: ${{ runner.os }}-yarn-16-spoke-${{ hashFiles('services/spoke/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-16-spoke-
      - name: Install dependencies
        working-directory: services/spoke
        run: yarn install --frozen-lockfile
      - name: Lint JS
        working-directory: services/spoke
        run: yarn lint:js
      - name: Build
        working-directory: services/spoke
        run: yarn build

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache npm + Playwright
        uses: actions/cache@v4
        with:
          path: |
            e2e/node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-20-e2e-${{ hashFiles('e2e/package-lock.json') }}-pw
          restore-keys: |
            ${{ runner.os }}-node-20-e2e-
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Validate E2E test syntax
        working-directory: e2e
        run: npx playwright test --list
