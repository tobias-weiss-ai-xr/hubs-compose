name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "20"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Validate docker-compose syntax
        run: docker compose config -q
      - name: Validate docker-compose override syntax
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config -q

  reticulum-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Reticulum
        run: git clone --depth 1 https://github.com/mozilla/reticulum.git services/reticulum
      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.14.3"
          otp-version: "23.3.4.18"
      - name: Get dependencies
        working-directory: services/reticulum
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Compile
        working-directory: services/reticulum
        run: mix compile
      - name: Run tests
        working-directory: services/reticulum
        env:
          DB_HOST: localhost
          DB_CREDENTIALS: postgres
          MIX_ENV: test
        run: mix test

  dialog-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Dialog
        run: git clone --depth 1 https://github.com/mozilla/dialog.git services/dialog
      - uses: actions/setup-node@v4
        with:
          node-version: "16"
      - name: Install dependencies
        working-directory: services/dialog
        run: npm ci
      - name: Lint
        working-directory: services/dialog
        run: npm run lint

  spoke-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Clone Spoke
        run: git clone --depth 1 https://github.com/mozilla/Spoke.git services/spoke
      - uses: actions/setup-node@v4
        with:
          node-version: "16"
      - name: Install dependencies
        working-directory: services/spoke
        run: yarn install --frozen-lockfile
      - name: Lint JS
        working-directory: services/spoke
        run: yarn lint:js
      - name: Build
        working-directory: services/spoke
        run: yarn build

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Validate E2E test syntax
        working-directory: e2e
        run: npx playwright test --list
